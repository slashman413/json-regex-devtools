  <div class="sub" data-i18n="sub">JSON 格式化／壓縮／驗證 + 正則測試。全部在你瀏覽器本機運算，不會上傳資料。</div>
  <div class="tabs"><button class="tab on" data-t="json" data-i18n="t_json">JSON 格式化</button><button class="tab" data-t="re" data-i18n="t_re">正則測試</button></div>

  <div class="panel on" id="p-json">
    <textarea id="jin" placeholder='{"hello":"world","n":[1,2,3]}'></textarea>
    <div class="btns">
      <button class="b" onclick="jfmt(2)" data-i18n="format">格式化</button>
      <button class="b ghost" onclick="jfmt(0)" data-i18n="minify">壓縮</button>
      <button class="b ghost" onclick="jcopy()" data-i18n="copy">複製結果</button>
    </div>
    <div class="msg" id="jmsg"></div>
    <textarea id="jout" readonly placeholder="輸出..."></textarea>
  </div>

  <div class="panel" id="p-re">
    <div class="row">
      <div style="flex:3"><label data-i18n="pattern">Pattern</label><input id="rpat" placeholder="\\b\\w+@\\w+\\.\\w+\\b" value=""></div>
      <div style="flex:1"><label data-i18n="flags">Flags</label><input id="rflags" value="g" placeholder="gim"></div>
    </div>
    <label style="margin-top:10px" data-i18n="teststr">測試字串</label>
    <textarea id="rtest" placeholder="貼上要比對的文字..."></textarea>
    <div class="msg" id="rmsg"></div>
    <div class="cnt" id="rcnt"></div>
    <div class="hl" id="rhl"></div>

<script>
  const $=id=>document.getElementById(id);
  document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); b.classList.add('on'); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on')); $('p-'+(b.dataset.t==='json'?'json':'re')).classList.add('on'); }));
  // JSON
  window.jfmt=(ind)=>{ const m=$("jmsg"); try{ const o=JSON.parse($("jin").value); $("jout").value=JSON.stringify(o,null,ind); m.className='msg ok'; m.textContent=I18N.valid[LANG==='en'?1:0]; }catch(e){ m.className='msg err'; m.textContent=(LANG==='en'?'Invalid JSON: ':'JSON 無效：')+e.message; } };
  window.jcopy=()=>{ navigator.clipboard.writeText($("jout").value); };
  // Regex
  function reRun(){
    const pat=$("rpat").value, fl=$("rflags").value, str=$("rtest").value, m=$("rmsg");
    $("rhl").innerHTML=''; $("rcnt").textContent='';
    if(!pat){ m.className='msg'; return; }
    let re; try{ re=new RegExp(pat, fl.includes('g')?fl:fl+'g'); m.className='msg'; }catch(e){ m.className='msg err'; m.textContent=(LANG==='en'?'Invalid regex: ':'正則錯誤：')+e.message; return; }
    let cnt=0, html='', last=0, mm;
    const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    re.lastIndex=0;
    while((mm=re.exec(str))!==null){ cnt++; html+=esc(str.slice(last,mm.index))+'<mark>'+esc(mm[0])+'</mark>'; last=mm.index+mm[0].length; if(mm[0]===''){ re.lastIndex++; } if(cnt>5000) break; }
    html+=esc(str.slice(last));
    $("rhl").innerHTML=html||'<span style="color:#555">—</span>';
    $("rcnt").textContent=(LANG==='en'?`${cnt} match(es)`:`找到 ${cnt} 個比對`);
  }
  ["rpat","rflags","rtest"].forEach(id=>$(id).addEventListener('input',reRun));

  const I18N={
    title:["JSON 格式化 + 正則測試","JSON Formatter + Regex Tester"],
    sub:["JSON 格式化／壓縮／驗證 + 正則測試。全部在你瀏覽器本機運算，不會上傳資料。","Format/validate JSON + test regex. Everything runs locally in your browser — nothing is uploaded."],
    t_json:["JSON 格式化","JSON"], t_re:["正則測試","Regex"],
    format:["格式化","Format"], minify:["壓縮","Minify"], copy:["複製結果","Copy"], valid:["✓ JSON 有效","✓ Valid JSON"],
    pattern:["Pattern","Pattern"], flags:["Flags","Flags"], teststr:["測試字串","Test string"],
    hp_t:["Soundcore Q20i 降噪耳機","Soundcore Q20i ANC Headphones"], hp_d:["寫 code 專注神器","Focus gear for coding"],
    aff_disc:["含 Amazon 聯盟連結，透過連結購買我們可能獲得回饋，不影響你的價格。As an Amazon Associate we earn from qualifying purchases.","Contains Amazon affiliate links — at no extra cost to you. As an Amazon Associate we earn from qualifying purchases."],
    home:["← 回 AI工具人首頁","← Back to AI Toolkit home"], terms:["服務說明","Terms"], privacy:["隱私權政策","Privacy"],
  };
  let LANG=localStorage.getItem('site_lang')||'zh';
  function setLang(l){ LANG=l; const i=l==='en'?1:0; document.querySelectorAll('[data-i18n]').forEach(el=>{ const t=I18N[el.getAttribute('data-i18n')]; if(t) el.textContent=t[i]; }); document.documentElement.lang=l==='en'?'en':'zh-TW'; $("langBtn").textContent=l==='en'?'中':'EN'; localStorage.setItem('site_lang',l); reRun(); }
  function toggleLang(){ setLang(LANG==='en'?'zh':'en'); } window.toggleLang=toggleLang;
  setLang(LANG);
  try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}
</script>
